<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Book AI Assistant</title>
    <!-- Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        /* --- THEME & COLORS --- */
        [data-theme="dark"] {
            --bg: #0A111A;
            --surface: #16202c;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: #1e293b;
        }
        [data-theme="light"] {
            --bg: #FDF7F8;
            --surface: #ffffff;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
        }
        :root { --primary: #ed0b3f; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            overflow: hidden; 
        }
        
        /* --- MAIN VIEW --- */
        #main-view { display: flex; flex-direction: column; height: 100vh; width: 100%; position: relative; }

        header { 
            flex-shrink: 0; background: var(--bg); border-bottom: 1px solid var(--border); 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-weight: 800; color: var(--primary); font-size: 1.1rem; }
        .controls { display: flex; gap: 8px; }
        
        .icon-btn { 
            background: var(--surface); border: 1px solid var(--border); 
            cursor: pointer; padding: 8px; border-radius: 10px; 
            display: flex; align-items: center; color: var(--text);
        }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }

        nav { flex-shrink: 0; display: flex; background: var(--bg); border-bottom: 1px solid var(--border); }
        nav button { 
            flex: 1; padding: 14px 5px; border: none; cursor: pointer; 
            background: none; color: var(--text-dim); font-weight: 600; font-size: 0.7rem;
            border-bottom: 3px solid transparent; text-transform: uppercase;
        }
        nav button.active { border-bottom: 3px solid var(--primary); color: var(--primary); }

        #content-frame { flex-grow: 1; border: none; width: 100%; background: white; }

        /* --- FAB --- */
        .fab { 
            position: absolute; bottom: 30px; right: 20px; 
            background: var(--primary); color: white; border: none; 
            border-radius: 50%; width: 60px; height: 60px; 
            box-shadow: 0 4px 15px rgba(237, 11, 63, 0.4); z-index: 900;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* --- CHAT OVERLAY (FIXED) --- */
        #chat-view { 
            display: none; flex-direction: column; 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg); z-index: 2000; 
        }
        .chat-header { flex-shrink: 0; background: var(--surface); padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        
        .chat-body { 
            flex-grow: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 80px; /* Space for the input bar */
        }
        
        /* Message Styling */
        .chat-msg { max-width: 85%; padding: 2px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; }
        .chat-msg h1, .chat-msg h2 { color: var(--primary); font-size: 1.1rem; margin: 10px 0; }
        .msg-user { align-self: flex-end; background: var(--primary); color: white; padding: 12px 16px; border-bottom-right-radius: 4px; }
        .msg-bot { align-self: flex-start; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        /* CHAT INPUT BAR (FIXED AT BOTTOM) */
        .chat-footer { 
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 12px; background: var(--surface); 
            border-top: 1px solid var(--border); 
            display: flex; gap: 10px; align-items: center;
        }
        .chat-input { 
            flex-grow: 1; background: var(--bg); border: 1px solid var(--border); 
            color: var(--text); padding: 12px 15px; border-radius: 25px; 
            outline: none; font-size: 1rem;
        }
        .send-btn {
            background: var(--primary); border: none; color: white;
            width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="main-view">
    <header>
        <div class="logo">BOOK COMPANION</div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleTheme()"><svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg></button>
            <button class="icon-btn" onclick="toggleLanguage()"><svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04z"/></svg></button>
            <button class="icon-btn" id="audioBtn" onclick="toggleAudio()">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </header>
    <nav>
        <button class="tab" onclick="changePage(1)">Background</button>
        <button class="tab" onclick="changePage(2)">Main Ideas</button>
        <button class="tab" onclick="changePage(3)">Discussions</button>
    </nav>
    <iframe id="content-frame"></iframe>
    <button class="fab" onclick="toggleChat(true)"><svg viewBox="0 0 24 24" width="30" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></button>
</div>

<!-- CHAT VIEW -->
<div id="chat-view">
    <div class="chat-header">
        <button onclick="toggleChat(false)" style="background:none; border:none; color:var(--text); font-weight:bold; font-size:1rem; cursor:pointer;">← BACK</button>
        <button onclick="setupKey()" style="margin-left:auto; background:var(--primary); border:none; color:white; font-size:0.7rem; padding:6px 12px; border-radius:8px;">CONFIG AI</button>
    </div>
    
    <div class="chat-body" id="chat-box">
        <div class="chat-msg msg-bot"><p>I've loaded the book content! How can I help you today?</p></div>
    </div>
    
    <div class="chat-footer">
        <input type="text" id="chat-input" class="chat-input" placeholder="Ask about the book...">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<audio id="audioPlayer" loop preload="auto"></audio>

<script>
    const config = {
        en: { pages: ["en1.html", "en2.html", "en3.html"], audio: "audio_en.wav" },
        hi: { pages: ["hi1.html", "hi2.html", "hi3.html"], audio: "audio_hi.wav" }
    };
    let currentLang = 'en', currentPage = 1, bookContext = "";

    async function loadBookContext() {
        let allText = "The following is the content of the book you are helping with: \n";
        const files = [...config.en.pages, ...config.hi.pages];
        for (let f of files) {
            try {
                const res = await fetch(f);
                const html = await res.text();
                const cleanText = html.replace(/<[^>]*>/g, ' ');
                allText += `\n[File: ${f}]\n${cleanText}`;
            } catch (e) { console.error("Missing: " + f); }
        }
        bookContext = allText;
    }

    function toggleTheme() {
        const root = document.documentElement;
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function updateUI() {
        document.getElementById('content-frame').src = config[currentLang].pages[currentPage - 1];
        const a = document.getElementById('audioPlayer');
        const wasPlaying = !a.paused;
        a.src = config[currentLang].audio;
        a.load();
        if (wasPlaying) a.play();
        document.querySelectorAll('.tab').forEach((btn, i) => btn.classList.toggle('active', i === (currentPage - 1)));
    }

    function toggleLanguage() { currentLang = (currentLang === 'en') ? 'hi' : 'en'; updateUI(); }
    function changePage(p) { currentPage = p; updateUI(); }
    
    function toggleAudio() {
        const a = document.getElementById('audioPlayer');
        const pI = document.getElementById('playIcon'), sI = document.getElementById('pauseIcon');
        if (a.paused) { a.play(); pI.style.display="none"; sI.style.display="block"; }
        else { a.pause(); pI.style.display="block"; sI.style.display="none"; }
    }

    function toggleChat(show) {
        document.getElementById('chat-view').style.display = show ? 'flex' : 'none';
    }

    function setupKey() {
        const key = prompt("Paste Gemini API Key:");
        if(key) localStorage.setItem('gemini_key', key);
    }

    async function sendMessage() {
        const key = localStorage.getItem('gemini_key');
        if(!key) return setupKey();
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;
        
        addMsg(text, 'user');
        input.value = '';

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: bookContext + "\n\nUser Question: " + text }] }]
                })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            addMsg(reply, 'bot');
        } catch (e) { addMsg("Error: Check your API Key.", 'bot'); }
    }

    function addMsg(t, s) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `chat-msg msg-${s}`;
        d.innerHTML = s === 'bot' ? marked.parse(t) : `<p>${t}</p>`;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    window.onload = () => { updateUI(); loadBookContext(); };
</script>
</body>
</html>
