<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Book App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #0A111A; 
            --primary: #ed0b3f; 
            --surface: #16202c;
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        body, html { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw;
            background: var(--bg); 
            color: var(--text);
            overflow: hidden; 
        }
        
        /* --- MAIN VIEW (BOOK) --- */
        #main-view { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
        
        header { background: var(--bg); border-bottom: 1px solid #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; color: var(--primary); font-size: 1.2rem; letter-spacing: 1px; }
        .controls { display: flex; gap: 15px; }
        
        .icon-btn { background: var(--surface); border: 1px solid #334155; cursor: pointer; padding: 10px; border-radius: 12px; display: flex; align-items: center; color: var(--text); transition: all 0.2s ease; }
        .icon-btn:hover { border-color: var(--primary); }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .icon-btn.active-lang { color: var(--primary); border-color: var(--primary); }

        nav { display: flex; background: var(--bg); border-bottom: 1px solid #1e293b; }
        nav button { flex: 1; padding: 16px; border: none; cursor: pointer; background: none; color: var(--text-dim); font-weight: 600; font-size: 0.9rem; border-bottom: 3px solid transparent; transition: 0.3s; }
        nav button.active { border-bottom: 3px solid var(--primary); color: var(--primary); background: linear-gradient(to bottom, transparent, rgba(237, 11, 63, 0.1)); }

        #content-frame { flex-grow: 1; border: none; width: 100%; background: white; }

        /* --- FLOATING ACTION BUTTON --- */
        .fab { position: absolute; bottom: 25px; right: 25px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 65px; height: 65px; box-shadow: 0 6px 16px rgba(237, 11, 63, 0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: transform 0.2s; }
        .fab:hover { transform: scale(1.05); }
        .fab svg { width: 32px; height: 32px; fill: currentColor; }

        /* --- CHAT VIEW --- */
        #chat-view { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg); z-index: 2000; }
        
        .chat-header { background: var(--surface); padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; }
        .back-btn { background: none; border: none; color: var(--text); font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 0; }
        .back-btn svg { width: 20px; height: 20px; fill: currentColor; }
        
        .chat-body { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .chat-msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .msg-user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-bot { align-self: flex-start; background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid #1e293b; }
        
        .chat-footer { padding: 15px; background: var(--surface); border-top: 1px solid #1e293b; display: flex; gap: 10px; align-items: center; }
        .chat-input { flex-grow: 1; background: var(--bg); border: 1px solid #334155; color: white; padding: 14px 20px; border-radius: 30px; outline: none; font-size: 1rem; }
        .chat-input:focus { border-color: var(--primary); }
        .send-btn { background: var(--primary); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }
        .send-btn svg { width: 20px; height: 20px; fill: currentColor; }
        
        /* Loading dots animation */
        .typing { display: flex; gap: 5px; padding: 10px; align-items: center; }
        .dot { width: 8px; height: 8px; background: var(--text-dim); border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes blink { 0%, 80%, 100% { transform: scale(0); opacity: 0; } 40% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<!-- MAIN BOOK VIEW -->
<div id="main-view">
    <header>
        <div class="logo">LEARN PRO</div>
        <div class="controls">
            <button class="icon-btn" id="langBtn" onclick="toggleLanguage()" title="Switch Language">
                <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
            </button>
            <button class="icon-btn" id="audioBtn" onclick="toggleAudio()" title="Play/Pause Audio">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </header>

    <nav>
        <button class="tab" onclick="changePage(1)">PAGE 1</button>
        <button class="tab" onclick="changePage(2)">PAGE 2</button>
        <button class="tab" onclick="changePage(3)">PAGE 3</button>
    </nav>

    <iframe id="content-frame"></iframe>

    <!-- FLOATING ACTION BUTTON -->
    <button class="fab" onclick="toggleChat(true)" title="Chat with Book">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/></svg>
    </button>
</div>

<!-- CHAT OVERLAY VIEW -->
<div id="chat-view">
    <div class="chat-header">
        <button class="back-btn" onclick="toggleChat(false)">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back to Book
        </button>
        <span style="margin-left: auto; font-weight: 700; color: var(--primary);">Book AI Chat</span>
    </div>
    
    <div class="chat-body" id="chat-box">
        <div class="chat-msg msg-bot">Hello! I'm your AI Book Assistant. Ask me anything about the contents of this book or general knowledge!</div>
    </div>
    
    <div class="chat-footer">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<audio id="audioPlayer" loop preload="auto"></audio>

<script>
    // ==========================================
    // 1. CONFIGURATION & API KEY
    // ==========================================
    
    // ⚠️ PASTE YOUR GEMINI API KEY HERE
    const GEMINI_API_KEY = AIzaSyB-J-lx1XjDCV0WsqI3s0xWI7Ulm3WjUmw; 
    
    const config = {
        en: { pages: ["en1.html", "en2.html", "en3.html"], audio: "audio_en.wav" },
        hi: { pages: ["hi1.html", "hi2.html", "hi3.html"], audio: "audio_hi.wav" }
    };

    let currentLang = 'en';
    let currentPage = 1;
    const audioPlayer = document.getElementById('audioPlayer');

    // ==========================================
    // 2. MAIN APP LOGIC (UI, Audio, Pages)
    // ==========================================
    function updateUI() {
        const frame = document.getElementById('content-frame');
        const langBtn = document.getElementById('langBtn');
        
        frame.src = config[currentLang].pages[currentPage - 1];
        
        const wasPlaying = !audioPlayer.paused;
        audioPlayer.src = config[currentLang].audio;
        audioPlayer.load(); 
        if (wasPlaying) audioPlayer.play();

        document.querySelectorAll('.tab').forEach((btn, i) => {
            btn.classList.toggle('active', i === (currentPage - 1));
        });
        langBtn.classList.toggle('active-lang', currentLang === 'hi');
    }

    function toggleLanguage() { currentLang = (currentLang === 'en') ? 'hi' : 'en'; updateUI(); }
    function changePage(p) { currentPage = p; updateUI(); }

    function toggleAudio() {
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const btn = document.getElementById('audioBtn');
        
        if (audioPlayer.paused) {
            audioPlayer.play().catch(() => alert("Please tap the screen first to allow audio."));
            playIcon.style.display = "none";
            pauseIcon.style.display = "block";
            btn.style.color = "var(--primary)";
        } else {
            audioPlayer.pause();
            playIcon.style.display = "block";
            pauseIcon.style.display = "none";
            btn.style.color = "var(--text)";
        }
    }

    // ==========================================
    // 3. CHATBOT LOGIC (Gemini API Integration)
    // ==========================================
    function toggleChat(show) {
        document.getElementById('main-view').style.display = show ? 'none' : 'flex';
        document.getElementById('chat-view').style.display = show ? 'flex' : 'none';
        if(show) setTimeout(() => document.getElementById('chat-input').focus(), 100);
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function addMessageToUI(text, sender) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-msg ${sender === 'user' ? 'msg-user' : 'msg-bot'}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv;
    }

    function addLoadingIndicator() {
        const chatBox = document.getElementById('chat-box');
        const loadDiv = document.createElement('div');
        loadDiv.className = 'chat-msg msg-bot typing';
        loadDiv.id = 'typing-indicator';
        loadDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        chatBox.appendChild(loadDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeLoadingIndicator() {
        const indicator = document.getElementById('typing-indicator');
        if (indicator) indicator.remove();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const message = input.value.trim();
        if (!message) return;

        // 1. Add User message to screen
        addMessageToUI(message, 'user');
        input.value = '';
        
        // 2. Show loading dots
        addLoadingIndicator();

        try {
            // 3. Setup Gemini API prompt context
            const systemContext = "You are a highly intelligent and helpful assistant built specifically into a book reading application. Provide clear, direct, and thoughtful answers based on literature, general knowledge, and context provided. Respond naturally.\n\nUser Question: ";
            
            const requestBody = {
                contents: [{ parts: [{ text: systemContext + message }] }]
            };

            // 4. Call API
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            removeLoadingIndicator();

            if (response.ok && data.candidates) {
                const botReply = data.candidates[0].content.parts[0].text;
                addMessageToUI(botReply, 'bot');
            } else {
                addMessageToUI("Error: Ensure your API key is correct.", 'bot');
            }
            
        } catch (error) {
            removeLoadingIndicator();
            addMessageToUI("Network Error. Please check your connection.", 'bot');
        }
    }

    // Initialize App
    window.onload = updateUI;

    // PWA Support
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIChlKSA9PiB7fSk7');
    }
</script>
</body>
</html>
