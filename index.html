<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Book App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #0A111A; 
            --primary: #ed0b3f; 
            --surface: #16202c;
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        body, html { font-family: -apple-system, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; width: 100vw; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Main UI */
        header { background: var(--bg); border-bottom: 1px solid #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; color: var(--primary); font-size: 1.2rem; }
        .controls { display: flex; gap: 12px; }
        .icon-btn { background: var(--surface); border: 1px solid #334155; cursor: pointer; padding: 10px; border-radius: 12px; color: var(--text); }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }

        nav { display: flex; background: var(--bg); border-bottom: 1px solid #1e293b; }
        nav button { flex: 1; padding: 16px; border: none; cursor: pointer; background: none; color: var(--text-dim); font-weight: 600; border-bottom: 3px solid transparent; }
        nav button.active { border-bottom: 3px solid var(--primary); color: var(--primary); }

        #content-frame { flex-grow: 1; border: none; width: 100%; background: white; }

        /* FAB */
        .fab { position: absolute; bottom: 25px; right: 25px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 65px; height: 65px; box-shadow: 0 6px 16px rgba(237, 11, 63, 0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .fab svg { width: 32px; height: 32px; fill: currentColor; }

        /* Chat UI */
        #chat-view { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg); z-index: 2000; }
        .chat-header { background: var(--surface); padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #1e293b; }
        .back-btn { background: none; border: none; color: var(--text); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .chat-body { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .chat-msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; }
        .msg-user { align-self: flex-end; background: var(--primary); color: white; }
        .msg-bot { align-self: flex-start; background: var(--surface); color: var(--text); border: 1px solid #1e293b; }
        .chat-footer { padding: 15px; background: var(--surface); border-top: 1px solid #1e293b; display: flex; gap: 10px; }
        .chat-input { flex-grow: 1; background: var(--bg); border: 1px solid #334155; color: white; padding: 12px 20px; border-radius: 30px; outline: none; }
        .send-btn { background: var(--primary); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Key Prompt Style */
        #key-config { background: #ed0b3f22; border: 1px dashed var(--primary); padding: 10px; border-radius: 10px; font-size: 0.8rem; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="main-view">
    <header>
        <div class="logo">LEARN PRO</div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleLanguage()"><svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg></button>
            <button class="icon-btn" id="audioBtn" onclick="toggleAudio()">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </header>
    <nav>
        <button class="tab" onclick="changePage(1)">PAGE 1</button>
        <button class="tab" onclick="changePage(2)">PAGE 2</button>
        <button class="tab" onclick="changePage(3)">PAGE 3</button>
    </nav>
    <iframe id="content-frame"></iframe>
    <button class="fab" onclick="toggleChat(true)"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/></svg></button>
</div>

<div id="chat-view">
    <div class="chat-header">
        <button class="back-btn" onclick="toggleChat(false)">
            <svg viewBox="0 0 24 24" width="20"><path fill="white" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Back
        </button>
        <button onclick="setupKey()" style="margin-left:auto; background:none; border:none; color:var(--text-dim); font-size:0.7rem;">SET API KEY</button>
    </div>
    <div class="chat-body" id="chat-box">
        <div id="key-warning" style="display:none;" id="key-config">⚠️ Gemini API Key not set. Tap 'SET API KEY' above.</div>
        <div class="chat-msg msg-bot">I'm your Book AI. How can I help?</div>
    </div>
    <div class="chat-footer">
        <input type="text" id="chat-input" class="chat-input" placeholder="Ask about the book...">
        <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24" width="20"><path fill="white" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
</div>

<audio id="audioPlayer" loop preload="auto"></audio>

<script>
    // 1. App Configuration
    const config = {
        en: { pages: ["en1.html", "en2.html", "en3.html"], audio: "audio_en.wav" },
        hi: { pages: ["hi1.html", "hi2.html", "hi3.html"], audio: "audio_hi.wav" }
    };
    let currentLang = 'en', currentPage = 1;
    const audioPlayer = document.getElementById('audioPlayer');

    // 2. Language & Audio Logic
    function updateUI() {
        document.getElementById('content-frame').src = config[currentLang].pages[currentPage - 1];
        const wasPlaying = !audioPlayer.paused;
        audioPlayer.src = config[currentLang].audio;
        audioPlayer.load();
        if (wasPlaying) audioPlayer.play();
        document.querySelectorAll('.tab').forEach((btn, i) => btn.classList.toggle('active', i === (currentPage - 1)));
    }
    function toggleLanguage() { currentLang = (currentLang === 'en') ? 'hi' : 'en'; updateUI(); }
    function changePage(p) { currentPage = p; updateUI(); }
    function toggleAudio() {
        const pI = document.getElementById('playIcon'), sI = document.getElementById('pauseIcon');
        if (audioPlayer.paused) { audioPlayer.play(); pI.style.display="none"; sI.style.display="block"; }
        else { audioPlayer.pause(); pI.style.display="block"; sI.style.display="none"; }
    }

    // 3. Chat & API Logic (Secure storage)
    function toggleChat(show) {
        document.getElementById('main-view').style.display = show ? 'none' : 'flex';
        document.getElementById('chat-view').style.display = show ? 'flex' : 'none';
        if(!localStorage.getItem('gemini_key')) document.getElementById('key-warning').style.display = 'block';
    }

    function setupKey() {
        const key = prompt("Enter your Gemini API Key:");
        if(key) {
            localStorage.setItem('gemini_key', key);
            document.getElementById('key-warning').style.display = 'none';
            alert("Key Saved Securely in your browser.");
        }
    }

    async function sendMessage() {
        const key = localStorage.getItem('gemini_key');
        if(!key) return setupKey();

        const input = document.getElementById('chat-input');
        const msg = input.value.trim();
        if(!msg) return;

        addMsg(msg, 'user');
        input.value = '';

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "You are a book assistant. Answer this: " + msg }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            addMsg(reply, 'bot');
        } catch (e) { addMsg("Error connecting. Check your Key.", 'bot'); }
    }

    function addMsg(t, s) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `chat-msg msg-${s}`;
        d.innerText = t;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    window.onload = updateUI;
</script>
</body>
</html>
