<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Book AI App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* --- THEME VARIABLES --- */
        [data-theme="dark"] {
            --bg: #0A111A;
            --surface: #16202c;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: #1e293b;
        }
        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
        }
        :root { --primary: #ed0b3f; }

        body, html { 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; 
            height: 100vh; width: 100vw;
            background: var(--bg); color: var(--text);
            overflow: hidden; transition: background 0.3s, color 0.3s;
        }
        
        /* --- HEADER & CONTROLS --- */
        header { 
            background: var(--bg); border-bottom: 1px solid var(--border); 
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-weight: 800; color: var(--primary); font-size: 1.1rem; letter-spacing: 1px; }
        .controls { display: flex; gap: 8px; }
        
        .icon-btn { 
            background: var(--surface); border: 1px solid var(--border); 
            cursor: pointer; padding: 8px; border-radius: 10px; 
            display: flex; align-items: center; color: var(--text);
        }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* --- NAVIGATION --- */
        nav { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); }
        nav button { 
            flex: 1; padding: 14px; border: none; cursor: pointer; 
            background: none; color: var(--text-dim); font-weight: 600; 
            border-bottom: 3px solid transparent; 
        }
        nav button.active { border-bottom: 3px solid var(--primary); color: var(--primary); }

        #content-frame { flex-grow: 1; border: none; width: 100%; background: white; }

        /* --- FAB --- */
        .fab { 
            position: absolute; bottom: 20px; right: 20px; 
            background: var(--primary); color: white; border: none; 
            border-radius: 50%; width: 60px; height: 60px; 
            box-shadow: 0 4px 12px rgba(237, 11, 63, 0.4); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; 
        }

        /* --- CHAT UI --- */
        #chat-view { 
            display: none; flex-direction: column; height: 100%; width: 100%; 
            position: absolute; top: 0; left: 0; background: var(--bg); z-index: 2000; 
        }
        .chat-header { background: var(--surface); padding: 12px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        .chat-body { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .chat-msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; line-height: 1.4; }
        .msg-user { align-self: flex-end; background: var(--primary); color: white; }
        .msg-bot { align-self: flex-start; background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .chat-footer { padding: 12px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .chat-input { flex-grow: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

<div id="main-view">
    <header>
        <div class="logo">BOOK PRO</div>
        <div class="controls">
            <!-- Theme Toggle -->
            <button class="icon-btn" onclick="toggleTheme()" title="Dark/Light Mode">
                <svg id="themeIcon" viewBox="0 0 24 24">
                    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                </svg>
            </button>
            <button class="icon-btn" onclick="toggleLanguage()"><svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg></button>
            <button class="icon-btn" id="audioBtn" onclick="toggleAudio()">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </header>
    <nav>
        <button class="tab" onclick="changePage(1)">PAGE 1</button>
        <button class="tab" onclick="changePage(2)">PAGE 2</button>
        <button class="tab" onclick="changePage(3)">PAGE 3</button>
    </nav>
    <iframe id="content-frame"></iframe>
    <button class="fab" onclick="toggleChat(true)"><svg viewBox="0 0 24 24" width="30" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></button>
</div>

<div id="chat-view">
    <div class="chat-header">
        <button onclick="toggleChat(false)" style="background:none; border:none; color:var(--text); font-weight:bold; cursor:pointer;">← BACK</button>
        <button onclick="setupKey()" style="margin-left:auto; background:none; border:none; color:var(--primary); font-size:0.7rem; cursor:pointer;">CONFIG API</button>
    </div>
    <div class="chat-body" id="chat-box">
        <div class="chat-msg msg-bot">Hello! I am Gemini 3 Flash. Ask me anything about the book or use my GK!</div>
    </div>
    <div class="chat-footer">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type a message...">
        <button onclick="sendMessage()" style="background:var(--primary); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">➤</button>
    </div>
</div>

<audio id="audioPlayer" loop preload="auto"></audio>

<script>
    const config = {
        en: { pages: ["en1.html", "en2.html", "en3.html"], audio: "audio_en.wav" },
        hi: { pages: ["hi1.html", "hi2.html", "hi3.html"], audio: "audio_hi.wav" }
    };
    let currentLang = 'en', currentPage = 1;
    const audioPlayer = document.getElementById('audioPlayer');

    function toggleTheme() {
        const root = document.documentElement;
        const current = root.getAttribute('data-theme');
        root.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function updateUI() {
        document.getElementById('content-frame').src = config[currentLang].pages[currentPage - 1];
        const wasPlaying = !audioPlayer.paused;
        audioPlayer.src = config[currentLang].audio;
        audioPlayer.load();
        if (wasPlaying) audioPlayer.play();
        document.querySelectorAll('.tab').forEach((btn, i) => btn.classList.toggle('active', i === (currentPage - 1)));
    }

    function toggleLanguage() { currentLang = (currentLang === 'en') ? 'hi' : 'en'; updateUI(); }
    function changePage(p) { currentPage = p; updateUI(); }
    function toggleAudio() {
        const pI = document.getElementById('playIcon'), sI = document.getElementById('pauseIcon');
        if (audioPlayer.paused) { audioPlayer.play(); pI.style.display="none"; sI.style.display="block"; }
        else { audioPlayer.pause(); pI.style.display="block"; sI.style.display="none"; }
    }

    function toggleChat(show) {
        document.getElementById('main-view').style.display = show ? 'none' : 'flex';
        document.getElementById('chat-view').style.display = show ? 'flex' : 'none';
    }

    function setupKey() {
        const key = prompt("Enter your Gemini API Key:");
        if(key) { localStorage.setItem('gemini_key', key); alert("Key Saved Locally."); }
    }

    async function sendMessage() {
        const key = localStorage.getItem('gemini_key');
        if(!key) return setupKey();
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;
        
        addMsg(text, 'user');
        input.value = '';

        try {
            // Updated to the accurate Gemini 3 Flash Preview endpoint
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            addMsg(reply, 'bot');
        } catch (e) { addMsg("Error: Check your Key or Connection.", 'bot'); }
    }

    function addMsg(t, s) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `chat-msg msg-${s}`;
        d.innerText = t;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    window.onload = updateUI;
</script>
</body>
</html>
