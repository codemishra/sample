<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Book AI Companion</title>
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        /* --- THEME DEFINITIONS --- */
        [data-theme="dark"] {
            --bg: #0A111A;
            --surface: #16202c;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: #1e293b;
            --primary: #ed0b3f;
        }
        [data-theme="light"] {
            --bg: #FDF7F8;
            --surface: #ffffff;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --primary: #D32F2F;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg); color: var(--text); overflow: hidden; 
            transition: background 0.3s;
        }
        
        /* --- LAYOUT --- */
        #main-view { display: flex; flex-direction: column; height: 100vh; width: 100%; position: relative; }

        header { 
            flex: 0 0 60px; background: var(--bg); border-bottom: 1px solid var(--border); 
            padding: 0 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-weight: 800; color: var(--primary); font-size: 1rem; letter-spacing: 1px; }
        .controls { display: flex; gap: 10px; }
        
        .icon-btn { 
            background: var(--surface); border: 1px solid var(--border); 
            cursor: pointer; padding: 8px; border-radius: 10px; 
            display: flex; align-items: center; color: var(--text); transition: all 0.2s;
        }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }

        nav { flex: 0 0 auto; display: flex; background: var(--bg); border-bottom: 1px solid var(--border); }
        nav button { 
            flex: 1; padding: 15px 5px; border: none; cursor: pointer; 
            background: none; color: var(--text-dim); font-weight: 700; font-size: 0.75rem;
            border-bottom: 3px solid transparent; transition: 0.3s;
        }
        }
        nav button.active { border-bottom: 3px solid var(--primary); color: var(--primary); }

        #content-frame { flex: 1; border: none; width: 100%; height: 100%; background: var(--bg); }

        /* --- UI ELEMENTS --- */
        .fab { 
            position: absolute; bottom: 25px; right: 25px; 
            background: var(--primary); color: white; border: none; 
            border-radius: 50%; width: 60px; height: 60px; 
            box-shadow: 0 8px 20px rgba(237, 11, 63, 0.4); z-index: 1000;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        #chat-view { display: none; flex-direction: column; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg); z-index: 2000; }
        .chat-header { flex: 0 0 60px; background: var(--surface); padding: 0 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth;}
        
        .chat-msg { max-width: 90%; border-radius: 18px; font-size: 1rem; line-height: 1.6; }
        .msg-user { align-self: flex-end; background: var(--primary); color: white; padding: 12px 18px; }
        .msg-bot { align-self: flex-start; background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 5px 20px; }
        .msg-bot h1, .msg-bot h2 { color: var(--primary); margin: 15px 0 10px 0; }
        
        .thinking { font-style: italic; color: var(--text-dim); font-size: 0.8rem; padding: 5px 15px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .chat-footer { flex: 0 0 70px; padding: 10px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0 15px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

<div id="main-view">
    <header>
        <div class="logo">Goldenreads</div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleTheme()"><svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg></button>
            <button class="icon-btn" onclick="toggleLanguage()"><svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg></button>
            <button class="icon-btn" id="audioBtn" onclick="toggleAudio()">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </header>
    <nav>
        <button class="tab" onclick="changePage(1)">Background</button>
        <button class="tab" onclick="changePage(2)">Main Ideas</button>
        <button class="tab" onclick="changePage(3)">Further Discussions</button>
    </nav>
    <iframe id="content-frame" onload="applyThemeToIframe()"></iframe>
    <button class="fab" onclick="toggleChat(true)"><svg viewBox="0 0 24 24" width="30" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></button>
</div>

<div id="chat-view">
    <div class="chat-header">
        <button onclick="toggleChat(false)" style="background:none; border:none; color:var(--text); font-weight:bold; cursor:pointer;">← EXIT</button>
        <button onclick="setupKey()" style="margin-left:auto; background:var(--primary); border:none; color:white; padding:6px 12px; border-radius:8px; font-size:0.7rem;">SET API KEY</button>
    </div>
    <div class="chat-body" id="chat-box">
        <div class="chat-msg msg-bot">Hi! I am <b>Gemini 3 Flash</b>. Ask me anything about the text!</div>
    </div>
    <div class="chat-footer">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" style="background:var(--primary); border:none; border-radius:50%; width:45px; height:45px; cursor:pointer; color:white;">➤</button>
    </div>
</div>

<audio id="audioPlayer" loop></audio>

<script>
    const config = {
        en: { pages: ["en1.html", "en2.html", "en3.html"], audio: "audio_en.wav" },
        hi: { pages: ["hi1.html", "hi2.html", "hi3.html"], audio: "audio_hi.wav" }
    };
    let currentLang = 'en', currentPage = 1, bookContext = "";

    // 1. CONTEXT & THEME INJECTION
    async function loadBookContext() {
        let text = "Book Data Context:\n";
        const files = [...config.en.pages, ...config.hi.pages];
        for (let f of files) {
            try {
                const res = await fetch(f);
                if (res.ok) {
                    const html = await res.text();
                    const clean = html.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
                    text += `\n[FILE: ${f}]\n${clean}\n`;
                }
            } catch (e) {}
        }
        bookContext = text;
    }

    function toggleTheme() {
        const root = document.documentElement;
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        applyThemeToIframe();
    }

    function applyThemeToIframe() {
        const frame = document.getElementById('content-frame');
        const theme = document.documentElement.getAttribute('data-theme');
        const colors = theme === 'dark' ? 
            { bg: '#0A111A', text: '#ffffff', box: '#0A111A', grid: 'rgba(255,255,255,0.04)', primary: '#ed0b3f' } : 
            { bg: '#FDF7F8', text: '#1a1a1a', box: '#ffffff', grid: 'rgba(0,0,0,0.05)', primary: '#D32F2F' };

        const css = `
            :root {
                --bg: ${colors.bg} !important; --text: ${colors.text} !important;
                --box-bg: ${colors.box} !important; --grid: ${colors.grid} !important;
                --canvas-text: ${colors.text} !important; --primary: ${colors.primary} !important;
            }
            body { background-color: var(--bg) !important; color: var(--text) !important; }
        `;
        try {
            const doc = frame.contentDocument || frame.contentWindow.document;
            let style = doc.getElementById('theme-overrider');
            if (!style) { style = doc.createElement('style'); style.id = 'theme-overrider'; doc.head.appendChild(style); }
            style.textContent = css;
        } catch (e) {}
    }
    // 2. MAIN NAVIGATION
    function updateUI() {
        document.getElementById('content-frame').src = config[currentLang].pages[currentPage - 1];
        const a = document.getElementById('audioPlayer');
        const wasPlaying = !a.paused;
        a.src = config[currentLang].audio;
        a.load(); if (wasPlaying) a.play();
        document.querySelectorAll('.tab').forEach((btn, i) => btn.classList.toggle('active', i === (currentPage - 1)));
    }

    function toggleLanguage() { currentLang = (currentLang === 'en') ? 'hi' : 'en'; updateUI(); }
    function changePage(p) { currentPage = p; updateUI(); }
    function toggleAudio() {
        const a = document.getElementById('audioPlayer'), pI = document.getElementById('playIcon'), sI = document.getElementById('pauseIcon');
        if (a.paused) { a.play(); pI.style.display="none"; sI.style.display="block"; }
        else { a.pause(); pI.style.display="block"; sI.style.display="none"; }
    }

    function toggleChat(show) {
        document.getElementById('main-view').style.display = show ? 'none' : 'flex';
        document.getElementById('chat-view').style.display = show ? 'flex' : 'none';
    }

    function setupKey() {
        const k = prompt("Paste your Gemini API Key:");
        if(k) { localStorage.setItem('gemini_key', k); alert("Key Saved."); }
    }

    // 3. STREAMING CHAT LOGIC
    async function sendMessage() {
        const key = localStorage.getItem('gemini_key');
        if(!key) return setupKey();
        const input = document.getElementById('chat-input'), text = input.value.trim();
        if(!text) return;
        
        addMsg(text, 'user'); input.value = '';
        const thinking = document.createElement('div');
        thinking.className = 'thinking'; thinking.innerText = 'AI is thinking...';
        document.getElementById('chat-box').appendChild(thinking);
        
        let fullResponse = "";
        const botBubble = addMsg("", 'bot');

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:streamGenerateContent?alt=sse&key=${key}`;
            const response = await fetch(url, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: bookContext + "\n\nUser Question: " + text }] }] })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            thinking.remove();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");
                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        try {
                            const json = JSON.parse(line.substring(6));
                            const delta = json.candidates[0].content.parts[0].text;
                            if (delta) {
                                fullResponse += delta;
                                botBubble.innerHTML = marked.parse(fullResponse);
                                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
            }
        } catch (e) { 
            if (thinking) thinking.remove();
            botBubble.innerText = "Error: " + e.message; 
        }
    }

    function addMsg(t, s) {
        const b = document.getElementById('chat-box'), d = document.createElement('div');
        d.className = `chat-msg msg-${s}`;
        d.innerHTML = s === 'bot' ? marked.parse(t) : t;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
        return d;
    }

    window.onload = () => { updateUI(); loadBookContext(); };
</script>
</body>
</html>
